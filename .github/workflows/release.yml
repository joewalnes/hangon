name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(TZ=UTC date +'%Y-%m-%d %H:%M')
          VERSION="${DATE} main ${SHA} release"
          LDFLAGS="-s -w -X 'main.version=${VERSION}'"
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o dist/hangon-darwin-arm64  .
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o dist/hangon-linux-amd64  .
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o dist/hangon-linux-arm64  .

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest \
            dist/hangon-darwin-arm64 \
            dist/hangon-linux-amd64 \
            dist/hangon-linux-arm64 \
            --title "Latest" \
            --notes "Built from main at $(git rev-parse --short HEAD)" \
            --latest
